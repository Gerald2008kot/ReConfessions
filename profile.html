<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mi Perfil — Re-Confessions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/app.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="view active" id="view-profile" style="overflow-y:auto;position:relative;">

  <header class="app-header">
    <a href="index.html" class="app-header__back" aria-label="Volver al feed">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
      </svg>
    </a>
    <h1 class="app-header__title">Mi Perfil</h1>
    <div id="header-chip" style="width:44px"></div>
  </header>

  <!-- Hero -->
  <div class="profile-hero">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profile-avatar-display">
        <span id="profile-initials" class="profile-avatar__initials"></span>
        <img id="profile-avatar-img" class="profile-avatar__img" alt="Foto de perfil" hidden />
      </div>
      <label class="profile-avatar__edit-btn" for="avatar-input" aria-label="Cambiar foto">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125"/>
        </svg>
      </label>
      <input type="file" id="avatar-input" class="uploader__input" accept="image/jpeg,image/png,image/gif,image/webp" />
    </div>

    <h2 id="profile-name"  class="profile-name"></h2>
    <p  id="profile-email" class="profile-email"></p>
    <span id="profile-admin-badge" class="profile-admin-badge" hidden>Admin</span>

    <div class="uploader__progress-track" id="avatar-progress-track" hidden style="width:180px;margin:10px auto 0">
      <div id="avatar-progress" class="uploader__progress-bar"></div>
    </div>
    <p id="avatar-status" class="profile-status"></p>

    <div class="profile-stats">
      <div class="profile-stat">
        <span id="stat-confessions" class="profile-stat__value">—</span>
        <span class="profile-stat__label">Confesiones</span>
      </div>
      <div class="profile-stat">
        <span id="stat-comments" class="profile-stat__value">—</span>
        <span class="profile-stat__label">Respuestas</span>
      </div>
      <div class="profile-stat">
        <span id="stat-likes" class="profile-stat__value">—</span>
        <span class="profile-stat__label">Likes</span>
      </div>
    </div>

    <div class="profile-actions">
      <button id="signout-btn" class="profile-signout-btn" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </div>

  <!-- Confesiones -->
  <div class="chat-divider" style="padding:0 16px;margin:0 0 4px">
    <div class="chat-divider__line"></div>
    <span class="chat-divider__label">Mis confesiones</span>
    <div class="chat-divider__line"></div>
  </div>

  <div id="profile-feed" class="feed-scroll" style="flex:none;overflow-y:visible;padding-bottom:40px;gap:8px">
    <p class="feed-empty">Cargando…</p>
  </div>

</div>


<script type="module">
  import { sb }                        from './js/api.js';
  import { getCurrentUser, getProfile,
           signOut, renderHeaderChip } from './js/auth.js';
  import { uploadImage }               from './js/upload.js';
  import { getInitials, showToast, formatDate } from './js/utils.js';
  import { Icons }                     from './js/icons.js';

  // ── Boot con guard completo ──────────────────────────────
  // Module-level userId — set by boot(), used by toggleLike/deleteConfession
  let _userId = null;

  async function boot() {
    const user = await getCurrentUser();

    // Sin sesión → login. El return detiene TODO el código que sigue.
    if (!user) {
      window.location.replace('./login.html');
      return;
    }

    _userId = user.id;  // make available to toggleLike/deleteConfession
    window.__openProfileSheet = () => {};

    // Cargar perfil + conteos en paralelo para render inmediato
    const [profile, confResult, cmResult] = await Promise.all([
      getProfile(user.id),
      sb.from('confessions').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
      sb.from('comments').select('id',    { count: 'exact', head: true }).eq('user_id', user.id),
    ]);

    // Render inmediato
    const chipSlot = document.getElementById('header-chip');
    renderHeaderChip(chipSlot, profile, () => window.location.replace('./login.html'));
    renderProfile(profile);

    document.getElementById('stat-confessions').textContent = confResult.count ?? 0;
    document.getElementById('stat-comments').textContent    = cmResult.count   ?? 0;

    // Sin bloquear el render inicial
    loadLikesReceived(user.id);
    loadMyConfessions(user.id, profile);

    // Sign out
    document.getElementById('signout-btn').addEventListener('click', async () => {
      await signOut();
      window.location.replace('./login.html');
    });

    // Avatar upload
    initAvatarUpload(user.id, profile, chipSlot);
  }

  boot();

  // ── Avatar upload ─────────────────────────────────────────
  function initAvatarUpload(userId, profile, chipSlot) {
    const avatarInput   = document.getElementById('avatar-input');
    const progressTrack = document.getElementById('avatar-progress-track');
    const progressBar   = document.getElementById('avatar-progress');
    const statusEl      = document.getElementById('avatar-status');

    avatarInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      statusEl.textContent = '';
      progressTrack.hidden = false;
      progressBar.style.width = '0%';
      try {
        const url = await uploadImage(file, (pct) => { progressBar.style.width = pct + '%'; });
        const { error } = await sb.from('profiles').update({ avatar_url: url }).eq('id', userId);
        if (error) throw new Error(error.message);
        const updated = { ...profile, avatar_url: url };
        renderProfile(updated);
        renderHeaderChip(chipSlot, updated, () => window.location.replace('./login.html'));
        statusEl.textContent = '✓ Foto actualizada';
        setTimeout(() => { statusEl.textContent = ''; }, 3000);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        progressTrack.hidden = true;
        progressBar.style.width = '0%';
        avatarInput.value = '';
      }
    });
  }

  // ── Funciones ─────────────────────────────────────────────

  function renderProfile(p) {
    document.getElementById('profile-name').textContent      = p.full_name;
    document.getElementById('profile-email').textContent     = user.email;
    document.getElementById('profile-initials').textContent  = getInitials(p.full_name);
    document.getElementById('profile-admin-badge').hidden    = !p.is_admin;

    const avatarImg = document.getElementById('profile-avatar-img');
    if (p.avatar_url) {
      avatarImg.src    = p.avatar_url;
      avatarImg.hidden = false;
      document.getElementById('profile-initials').hidden = true;
    } else {
      avatarImg.hidden = true;
      document.getElementById('profile-initials').hidden = false;
    }
  }

  async function loadLikesReceived(userId) {
    const { data: myIds } = await sb.from('confessions').select('id').eq('user_id', userId);
    if (!myIds?.length) { document.getElementById('stat-likes').textContent = '0'; return; }
    const { count } = await sb.from('likes')
      .select('id', { count: 'exact', head: true })
      .in('confession_id', myIds.map(r => r.id));
    document.getElementById('stat-likes').textContent = count ?? 0;
  }

  async function loadMyConfessions(userId, profile) {
    const profileFeed = document.getElementById('profile-feed');

    // Fetch confesiones + likes + comentarios + propios likes en paralelo
    const { data, error } = await sb
      .from('confessions')
      .select('id, user_id, content, image_url, hashtag, created_at')
      .eq('user_id', userId)
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) { showToast('Error.', 'error'); return; }

    while (profileFeed.firstChild) profileFeed.removeChild(profileFeed.firstChild);

    if (!data?.length) {
      profileFeed.appendChild(
        Object.assign(document.createElement('p'), {
          className: 'feed-empty',
          textContent: 'Aún no has publicado ninguna confesión.',
        })
      );
      return;
    }

    const ids = data.map(c => c.id);
    const [{ data: lk }, { data: cm }, { data: myLikes }] = await Promise.all([
      sb.from('likes').select('confession_id').in('confession_id', ids),
      sb.from('comments').select('confession_id').in('confession_id', ids),
      sb.from('likes').select('confession_id').eq('user_id', userId).in('confession_id', ids),
    ]);

    const likeMap    = countMap(lk,      'confession_id');
    const commentMap = countMap(cm,      'confession_id');
    const likedSet   = new Set(myLikes?.map(r => r.confession_id) || []);

    data.forEach(c => renderConfessionCard(c, likeMap[c.id] || 0, commentMap[c.id] || 0, likedSet.has(c.id)));
  }

  function countMap(rows, key) {
    const m = {};
    rows?.forEach(r => { m[r[key]] = (m[r[key]] || 0) + 1; });
    return m;
  }

  // ── Renderizar tarjeta compacta (misma estructura que rc-card) ─
  function renderConfessionCard(c, likeCount, commentCount, isLiked) {
    const { hashtagColor } = getHashtagColor(c.hashtag || '#Confesión');
    const card = document.createElement('article');
    card.className = 'rc-card';
    card.setAttribute('id', `pcard-${c.id}`);

    // Top row
    const top = document.createElement('div');
    top.className = 'rc-card__top';

    const av = document.createElement('div');
    av.className = 'rc-card__avatar';
    if (profile.avatar_url) {
      const img = document.createElement('img');
      img.src = profile.avatar_url; img.alt = 'Avatar';
      av.appendChild(img);
    } else {
      av.appendChild(Icons.user(14));
    }
    top.appendChild(av);

    const { bg, fg } = hashtagColor;
    const tag = document.createElement('span');
    tag.className = 'rc-card__tag';
    tag.textContent = c.hashtag || '#Confesión';
    tag.style.cssText = `background:${bg};color:${fg}`;
    top.appendChild(tag);

    const time = document.createElement('span');
    time.className = 'rc-card__time';
    time.textContent = formatDate(c.created_at);
    top.appendChild(time);

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.className = 'rc-card__del';
    delBtn.type = 'button';
    delBtn.setAttribute('aria-label', 'Borrar');
    delBtn.appendChild(Icons.trash(15));
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteConfession(c.id, card); });
    top.appendChild(delBtn);

    card.appendChild(top);

    // Body row
    const body = document.createElement('div');
    body.className = 'rc-card__body-row';

    const text = document.createElement('p');
    text.className = 'rc-card__text';
    text.textContent = c.content;
    body.appendChild(text);

    if (c.image_url) {
      const thumb = document.createElement('div');
      thumb.className = 'rc-card__thumb';
      const img = document.createElement('img');
      img.src = c.image_url; img.alt = 'Imagen'; img.loading = 'lazy';
      img.addEventListener('click', (e) => { e.stopPropagation(); openImageModal(c.image_url); });
      thumb.appendChild(img);
      body.appendChild(thumb);
    }
    card.appendChild(body);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'rc-card__footer';

    const likeBtn = document.createElement('button');
    likeBtn.className = `rc-card__action${isLiked ? ' rc-card__action--liked' : ''}`;
    likeBtn.type = 'button';
    likeBtn.appendChild(Icons.heart(isLiked, 17));
    likeBtn.appendChild(Object.assign(document.createElement('span'), {
      className: 'rc-card__action-count', textContent: String(likeCount),
    }));
    likeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(c.id, likeBtn); });
    footer.appendChild(likeBtn);

    const cmBtn = document.createElement('button');
    cmBtn.className = 'rc-card__action';
    cmBtn.type = 'button';
    cmBtn.appendChild(Icons.chat(17));
    cmBtn.appendChild(Object.assign(document.createElement('span'), {
      className: 'rc-card__action-count', textContent: String(commentCount),
    }));
    footer.appendChild(cmBtn);
    card.appendChild(footer);

    document.getElementById('profile-feed').appendChild(card);
  }

  // ── Like toggle ───────────────────────────────────────────
  async function toggleLike(confessionId, btn) {
    const isLiked   = btn.classList.contains('rc-card__action--liked');
    const countSpan = btn.querySelector('.rc-card__action-count');
    const count     = parseInt(countSpan.textContent) || 0;
    const updateIcon = (filled) => {
      const old = btn.querySelector('svg');
      if (old) btn.replaceChild(Icons.heart(filled, 17), old);
    };
    if (isLiked) {
      btn.classList.remove('rc-card__action--liked');
      updateIcon(false);
      countSpan.textContent = String(count - 1);
      await sb.from('likes').delete().match({ confession_id: confessionId, user_id: _userId });
    } else {
      btn.classList.add('rc-card__action--liked');
      updateIcon(true);
      countSpan.textContent = String(count + 1);
      btn.classList.add('rc-card__action--pop');
      btn.addEventListener('animationend', () => btn.classList.remove('rc-card__action--pop'), { once: true });
      await sb.from('likes').insert({ confession_id: confessionId, user_id: _userId });
    }
  }

  // ── Delete ────────────────────────────────────────────────
  async function deleteConfession(id, cardEl) {
    if (!confirm('¿Borrar esta confesión? No se puede deshacer.')) return;
    const { error } = await sb.from('confessions').delete().eq('id', id);
    if (error) { showToast(error.message, 'error'); return; }
    cardEl.remove();
    // Actualizar contador
    const stat = document.getElementById('stat-confessions');
    stat.textContent = Math.max(0, parseInt(stat.textContent) - 1);
    showToast('Confesión eliminada.', 'success');
  }

  // ── Image modal ───────────────────────────────────────────
  function openImageModal(url) {
    const existing = document.getElementById('img-modal');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.className = 'img-modal';
    overlay.id = 'img-modal';
    const img = document.createElement('img');
    img.src = url; img.alt = 'Imagen completa'; img.className = 'img-modal__img';
    const closeBtn = document.createElement('button');
    closeBtn.className = 'img-modal__close';
    closeBtn.type = 'button';
    closeBtn.appendChild(Icons.close(20));
    const close = () => overlay.remove();
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); }, { once: true });
    overlay.appendChild(closeBtn);
    overlay.appendChild(img);
    document.body.appendChild(overlay);
    requestAnimationFrame(() => overlay.classList.add('img-modal--open'));
  }

  // ── Hashtag color (mismo sistema que feed.js) ────────────────
  const HASHTAG_HS = {
    '#Confesión':      { h: 260, s: 70 }, '#Desamor':        { h:   0, s: 80 },
    '#Traición':       { h:  25, s: 85 }, '#Ruptura':        { h: 330, s: 75 },
    '#Secreto':        { h:  45, s: 90 }, '#Familia':        { h: 145, s: 65 },
    '#Trabajo':        { h: 215, s: 75 }, '#Amistad':        { h: 175, s: 65 },
    '#Vergüenza':      { h: 290, s: 65 }, '#Arrepentimiento':{ h:  10, s: 60 },
    '#Felicidad':      { h:  52, s: 85 }, '#Miedo':          { h: 240, s: 65 },
    '#Sueño':          { h: 275, s: 70 }, '#Enojo':          { h:   4, s: 90 },
    '#Nostalgia':      { h: 200, s: 70 },
  };
  function hashStr(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  function getHashtagColor(tag) {
    const e = HASHTAG_HS[tag];
    const h = e ? e.h : (hashStr(tag) % 360);
    const s = e ? e.s : 65;
    return { hashtagColor: {
      bg: `hsla(${h},${s}%,60%,0.13)`,
      fg: `hsl(${h},${Math.min(s+10,95)}%,72%)`,
    }};
  }
</script>

</body>
</html>
