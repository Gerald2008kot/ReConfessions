<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Re-Confessions</title>
  <meta name="description" content="Tu espacio seguro y anónimo." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/app.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     VISTA: FEED
════════════════════════════════════════════════════════════════ -->
<div id="view-feed" class="view active">

  <!-- Header fijo -->
  <header class="app-header">
    <h1 class="app-header__title">Feed</h1>

    <!-- Chip de sesión -->
    <div id="header-chip"></div>
  </header>

  <!-- Lista de confesiones -->
  <main id="feed" class="feed-scroll" aria-label="Feed de confesiones" aria-live="polite">
    <p class="feed-empty">Cargando confesiones…</p>
  </main>

  <!-- Barra de compose (autenticados) -->
  <div id="compose-bar" class="compose-bar" hidden>
    <!-- Fila superior: hashtag selector -->
    <div class="compose-bar__top">
      <select id="compose-hashtag" class="compose-hashtag-select" aria-label="Elige un hashtag">
        <!-- Poblado por feed.js -->
      </select>
      <!-- Botón imagen -->
      <label class="compose-img-btn" for="compose-img-input" title="Adjuntar imagen" aria-label="Adjuntar imagen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
        </svg>
      </label>
      <input type="file" id="compose-img-input" class="uploader__input"
        accept="image/jpeg,image/png,image/gif,image/webp" />
    </div>

    <!-- Preview imagen -->
    <div id="compose-img-preview" class="compose-img-preview" hidden></div>

    <!-- Progress bar -->
    <div class="uploader__progress-track" hidden>
      <div id="compose-progress" class="uploader__progress-bar"></div>
    </div>

    <!-- Fila de input + enviar -->
    <div class="compose-bar__input-row">
      <textarea
        id="compose-input"
        class="compose-textarea"
        placeholder="Confiesa algo…"
        maxlength="2000"
        rows="2"
        aria-label="Escribe tu confesión"
      ></textarea>
      <button id="compose-send-btn" class="compose-send-btn" type="button" aria-label="Publicar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Prompt de login (invitados / no autenticados) -->
  <div id="login-prompt-bar" class="login-prompt-bar" hidden>
    <a href="login.html" class="login-prompt-bar__link">
      Inicia sesión para confesar
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
      </svg>
    </a>
  </div>

</div><!-- /#view-feed -->


<!-- ═══════════════════════════════════════════════════════════
     VISTA: CHAT (Hilo de comentarios)
════════════════════════════════════════════════════════════════ -->
<div id="view-chat" class="view">

  <!-- Header del hilo -->
  <header class="app-header">
    <button id="chat-back-btn" class="app-header__back" type="button" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
      </svg>
    </button>
    <h2 class="app-header__title">Hilo</h2>
  </header>

  <div class="chat-scroll">
    <!-- Slot de la confesión (renderizado por chat.js con estructura rc-card) -->
    <div id="chat-confession-slot" class="chat-confession-slot"></div>

    <!-- Separador -->
    <div class="chat-divider">
      <div class="chat-divider__line"></div>
      <span class="chat-divider__label">Comentarios</span>
      <div class="chat-divider__line"></div>
    </div>

    <!-- Lista de burbujas -->
    <div id="chat-comment-list" class="chat-comment-list" role="log" aria-live="polite">
    </div>
  </div>

  <!-- Barra de input (autenticados) -->
  <div id="chat-input-bar" class="chat-input-bar" hidden>
    <input
      id="chat-comment-input"
      class="chat-input"
      type="text"
      placeholder="Escribe un consejo…"
      maxlength="500"
      aria-label="Tu comentario"
    />
    <button id="chat-comment-submit" class="chat-send-btn" type="button" aria-label="Enviar">
      Enviar
    </button>
  </div>

  <!-- Prompt de login en el hilo -->
  <div id="chat-login-prompt" class="chat-login-prompt" hidden>
    <a href="login.html">Inicia sesión</a> para unirte a la conversación.
  </div>

</div><!-- /#view-chat -->


<!-- ═══════════════════════════════════════════════════════════
     BOTTOM SHEET: Perfil de usuario
════════════════════════════════════════════════════════════════ -->
<div id="profile-overlay" class="profile-overlay"></div>

<div id="profile-sheet" class="profile-sheet">
  <div id="profile-sheet-handle" class="profile-sheet__handle"></div>

  <div class="profile-sheet__body">
    <div class="profile-sheet__user">
      <div id="sheet-avatar" class="profile-sheet__avatar"></div>
      <div>
        <p id="sheet-name"  class="profile-sheet__name"></p>
        <p id="sheet-email" class="profile-sheet__email"></p>
      </div>
    </div>

    <div class="profile-sheet__actions">
      <a href="profile.html" class="profile-sheet__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
        <span>Mi Perfil y Foto</span>
      </a>
      <!-- Solo visible para admins — controlado por JS -->
      <button id="sheet-admin" class="profile-sheet__item profile-sheet__item--btn" type="button" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>Administración</span>
        <span class="profile-sheet__item-badge">Admin</span>
      </button>
      <button id="sheet-signout" class="profile-sheet__signout" type="button">
        Cerrar Sesión
      </button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     VISTA: ADMINISTRACIÓN
════════════════════════════════════════════════════════════════ -->
<div id="view-admin" class="view" hidden>

  <header class="app-header">
    <button id="admin-back-btn" class="app-header__back" type="button" aria-label="Volver">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
      </svg>
    </button>
    <h2 class="app-header__title">Administración</h2>
    <div style="width:38px"></div>
  </header>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button id="admin-tab-users"  class="admin-tab active" type="button">Usuarios</button>
    <button id="admin-tab-create" class="admin-tab"        type="button">Crear Usuario</button>
  </div>

  <!-- Panel: Usuarios -->
  <div id="admin-panel-users" class="admin-panel active">
    <div id="admin-user-list" class="admin-user-list">
      <p class="admin-loading">Cargando…</p>
    </div>
  </div>

  <!-- Panel: Crear Usuario -->
  <div id="admin-panel-create" class="admin-panel">
    <form id="admin-create-form" class="admin-create-form" novalidate>

      <div class="admin-field">
        <label for="admin-create-name">Nombre completo</label>
        <input type="text" id="admin-create-name" class="admin-input"
          placeholder="Nombre del usuario" maxlength="80" required />
      </div>

      <div class="admin-field">
        <label for="admin-create-email">Correo electrónico</label>
        <input type="email" id="admin-create-email" class="admin-input"
          placeholder="correo@ejemplo.com" required />
      </div>

      <div class="admin-field">
        <label for="admin-create-password">Contraseña temporal</label>
        <input type="password" id="admin-create-password" class="admin-input"
          placeholder="Mínimo 8 caracteres" minlength="8" required />
      </div>

      <div class="admin-checkbox-row">
        <input type="checkbox" id="admin-create-is-admin" />
        <label for="admin-create-is-admin">Dar permisos de administrador</label>
      </div>

      <p id="admin-create-error" class="admin-error" role="alert"></p>

      <button type="submit" class="admin-submit-btn">Crear Usuario</button>
    </form>
  </div>

</div>


<!-- ── Scripts ──────────────────────────────────────────────── -->
<script type="module">
  import { initFeed }                            from './js/feed.js';
  import { getCurrentUser, getProfile,
           renderHeaderChip, onAuthStateChange,
           signOut }                             from './js/auth.js';
  import { getInitials }                         from './js/utils.js';
  import { initAdmin, openAdmin, closeAdmin }    from './js/admin.js';

  const isGuest = sessionStorage.getItem('rc_guest') === '1';

  onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT' && !isGuest) window.location.replace('./login.html');
  });

  // Definir ANTES de boot para que esté disponible cuando renderHeaderChip lo busque
  window.__openProfileSheet = function() {
    document.getElementById('profile-sheet')?.classList.add('open');
    document.getElementById('profile-overlay')?.classList.add('open');
  };
  window.__closeProfileSheet = function() {
    document.getElementById('profile-sheet')?.classList.remove('open');
    document.getElementById('profile-overlay')?.classList.remove('open');
  };

  async function boot() {
    const user = await getCurrentUser();
    if (!user && !isGuest) { window.location.replace('./login.html'); return; }

    // Chip
    const chipSlot = document.getElementById('header-chip');
    const profile  = user ? await getProfile(user.id) : null;
    renderHeaderChip(chipSlot, profile, openProfileSheet);

    // Bottom sheet de perfil
    if (user && profile) {
      const sheetName   = document.getElementById('sheet-name');
      const sheetEmail  = document.getElementById('sheet-email');
      const sheetAvatar = document.getElementById('sheet-avatar');

      if (sheetName)  sheetName.textContent  = profile.full_name;
      if (sheetEmail) sheetEmail.textContent  = user.email;

      if (sheetAvatar) {
        if (profile.avatar_url) {
          const img = document.createElement('img');
          img.src = profile.avatar_url;
          img.alt = 'Avatar';
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
          sheetAvatar.appendChild(img);
        } else {
          sheetAvatar.textContent = getInitials(profile.full_name);
        }
      }
    }

    // Sign out desde el sheet
    document.getElementById('sheet-signout')?.addEventListener('click', async () => {
      sessionStorage.removeItem('rc_guest');
      await signOut();
      window.location.replace('./login.html');
    });

    // Handle del sheet
    document.getElementById('profile-sheet-handle')?.addEventListener('click', () => window.__closeProfileSheet());
    document.getElementById('profile-overlay')?.addEventListener('click', () => window.__closeProfileSheet());

    // Mostrar botón de admin si corresponde
    if (profile?.is_admin) {
      const adminBtn = document.getElementById('sheet-admin');
      if (adminBtn) {
        adminBtn.hidden = false;
        adminBtn.addEventListener('click', () => {
          window.__closeProfileSheet();
          openAdmin();
        });
      }
    }

    // Init admin (solo carga lógica, no muestra nada todavía)
    await initAdmin(() => {
      document.getElementById('view-admin')?.classList.remove('active');
      document.getElementById('view-admin').hidden = true;
      document.getElementById('view-feed')?.classList.add('active');
    });

    await initFeed();
  }

  function openProfileSheet()  { window.__openProfileSheet(); }
  function closeProfileSheet() { window.__closeProfileSheet(); }

  boot();
</script>

</body>
</html>
