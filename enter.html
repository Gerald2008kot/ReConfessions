<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>ReConfessions — Cargando</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400;1,700;1,800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:            #0a090e;
  --border-active: rgba(155,127,255,0.4);
  --accent:        #9b7fff;
  --accent-glow:   rgba(155,127,255,0.18);
  --accent-rose:   #e8596a;
  --text:          #e8e4f0;
  --text-3:        #5a5470;
  --radius-md:     16px;
  --radius-full:   999px;
  --ease:          cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Grain */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* Ambient glow */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(155,127,255,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(232,89,106,0.05) 0%, transparent 60%);
}

/* Línea vertical */
.connection-line {
  position: fixed; top: 0; left: 50%;
  width: 1px; height: 100%;
  transform: translateX(-50%);
  background: linear-gradient(to bottom, transparent, rgba(155,127,255,0.35) 35%, rgba(232,89,106,0.2) 65%, transparent);
  opacity: 0.35; pointer-events: none; z-index: 1;
}

/* Layout */
.splash {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}

/* Logo box */
.logo-box {
  border: 1px solid var(--border-active);
  padding: 22px 48px;
  border-radius: var(--radius-md);
  background: rgba(155,127,255,0.04);
  box-shadow: 0 0 40px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.06);
  margin-bottom: 28px;
  animation: fadeUp 0.9s var(--ease) 0.2s both, logoPulse 4s ease-in-out 1.5s infinite;
}

.logo-box h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 800; font-style: italic;
  font-size: clamp(2.2rem, 8vw, 3.4rem);
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}

.logo-box h1 span { color: var(--accent); }

/* Slogan */
.slogan {
  font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 36px;
  animation: fadeUp 0.8s var(--ease) 0.7s both;
}

/* Botón */
.enter-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 36px;
  background: var(--accent); color: #fff;
  border-radius: var(--radius-full);
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  text-decoration: none; cursor: pointer;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 24px rgba(155,127,255,0.32);
  transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
  animation: fadeUp 0.8s var(--ease) 1.1s both;
}

.enter-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(155,127,255,0.48);
}
.enter-btn:active { transform: translateY(0); }

.enter-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  animation: shine 2.6s ease-in-out 2s infinite;
}

.btn-arrow {
  width: 15px; height: 15px; flex-shrink: 0;
  transition: transform 0.3s var(--ease);
}
.enter-btn:hover .btn-arrow { transform: translateX(4px); }

/* Barra y contador */
.countdown-wrap {
  margin-top: 24px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  animation: fadeUp 0.7s var(--ease) 1.5s both;
}

.bar-track {
  width: 160px; height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-rose));
  border-radius: var(--radius-full);
  width: 100%;
  transform-origin: left;
  animation: drain 5s linear 1.6s forwards;
}

.count-label {
  font-size: 0.58rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-3);
}

/* Footer */
.footer-info {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-3); opacity: 0.45; white-space: nowrap;
  animation: fadeUp 0.7s var(--ease) 1.9s both;
}

/* Keyframes */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes logoPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(155,127,255,0.14), inset 0 1px 0 rgba(255,255,255,0.06); }
  50%       { box-shadow: 0 0 64px rgba(155,127,255,0.32), inset 0 1px 0 rgba(255,255,255,0.06); }
}

@keyframes shine {
  0%        { left: -100%; }
  60%, 100% { left: 100%; }
}

@keyframes drain {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="connection-line"></div>

<div class="splash">
  <div class="logo-box">
    <h1>Re‑<span>C</span>onfessions</h1>
  </div>

  <p class="slogan">Anonimato con propósito</p>

  <a href="index.html" class="enter-btn">
    Entrar al espacio
    <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>

  <div class="countdown-wrap">
    <div class="bar-track">
      <div class="bar-fill"></div>
    </div>
    <span class="count-label" id="countLabel">Redirigiendo en 5s…</span>
  </div>
</div>

<p class="footer-info">Re‑Confessions © 2026</p>

<script>
  let secs = 5;
  const label = document.getElementById('countLabel');

  const tick = setInterval(() => {
    secs--;
    if (secs <= 0) {
      clearInterval(tick);
      window.location.href = 'index.html';
    } else {
      label.textContent = 'Redirigiendo en ' + secs + 's…';
    }
  }, 1000);
</script>

</body>
</html>
