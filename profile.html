<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Re-Confessions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="site-wrapper">

  <header class="site-header" role="banner">
    <div class="container site-header__inner">
      <a href="index.html" class="site-header__logo">
        <span class="site-header__logo-dot" aria-hidden="true"></span>
        Re-Confessions
      </a>
      <div id="header-chip"></div>
    </div>
  </header>

  <main class="profile-page" role="main">
    <div class="container">

      <div class="profile-card">

        <!-- Avatar -->
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profile-avatar-display">
            <span id="profile-initials" class="profile-avatar__initials"></span>
            <img id="profile-avatar-img" class="profile-avatar__img" alt="Profile picture" hidden />
          </div>
          <label class="profile-avatar__edit-btn" for="avatar-input" title="Change photo" aria-label="Change profile photo">
            ✏️
          </label>
          <input type="file" id="avatar-input" class="uploader__input"
            accept="image/jpeg,image/png,image/gif,image/webp" />
        </div>

        <!-- Name -->
        <h1 id="profile-name" class="profile-name"></h1>
        <p id="profile-email" class="profile-email"></p>
        <span id="profile-admin-badge" class="chip__badge chip__badge--admin" hidden>Admin</span>

        <!-- Avatar upload progress -->
        <div class="uploader__progress-track" id="avatar-progress-track" hidden style="width:200px;margin:12px auto 0">
          <div id="avatar-progress" class="uploader__progress-bar"></div>
        </div>
        <p id="avatar-status" class="profile-status"></p>

        <div class="profile-divider"></div>

        <!-- Stats -->
        <div class="profile-stats">
          <div class="profile-stat">
            <span id="stat-confessions" class="profile-stat__value">—</span>
            <span class="profile-stat__label">Confessions</span>
          </div>
          <div class="profile-stat">
            <span id="stat-comments" class="profile-stat__value">—</span>
            <span class="profile-stat__label">Replies</span>
          </div>
        </div>

        <div class="profile-divider"></div>

        <!-- Actions -->
        <div class="profile-actions">
          <a href="index.html" class="btn btn--ghost">← Back to Feed</a>
          <button id="signout-btn" class="btn btn--danger" type="button">Sign Out</button>
        </div>

      </div>

    </div>
  </main>
</div>


<script type="module">
  import { sb }                                  from './js/api.js';
  import { getCurrentUser, getProfile,
           signOut, renderHeaderChip }           from './js/auth.js';
  import { uploadImage }                         from './js/upload.js';
  import { getInitials, showToast }              from './js/utils.js';

  // ── Guard ────────────────────────────────────────────────
  const user = await getCurrentUser();
  if (!user) { window.location.replace('./login.html'); }

  let profile = await getProfile(user.id);

  // ── Header chip ──────────────────────────────────────────
  const chipSlot = document.getElementById('header-chip');
  renderHeaderChip(chipSlot, profile, () => window.location.replace('./login.html'));

  // ── Render profile ───────────────────────────────────────
  function renderProfile(p) {
    document.getElementById('profile-name').textContent  = p.full_name;
    document.getElementById('profile-email').textContent = user.email;
    document.getElementById('profile-initials').textContent = getInitials(p.full_name);

    const adminBadge = document.getElementById('profile-admin-badge');
    adminBadge.hidden = !p.is_admin;

    const avatarImg = document.getElementById('profile-avatar-img');
    if (p.avatar_url) {
      avatarImg.src    = p.avatar_url;
      avatarImg.hidden = false;
      document.getElementById('profile-initials').hidden = true;
    } else {
      avatarImg.hidden = true;
      document.getElementById('profile-initials').hidden = false;
    }
  }
  renderProfile(profile);

  // ── Stats ────────────────────────────────────────────────
  async function loadStats() {
    const [{ count: cCount }, { count: cmCount }] = await Promise.all([
      sb.from('confessions').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
      sb.from('comments').select('id',    { count: 'exact', head: true }).eq('user_id', user.id),
    ]);
    document.getElementById('stat-confessions').textContent = cCount ?? 0;
    document.getElementById('stat-comments').textContent    = cmCount ?? 0;
  }
  loadStats();

  // ── Avatar upload ────────────────────────────────────────
  const avatarInput     = document.getElementById('avatar-input');
  const progressTrack   = document.getElementById('avatar-progress-track');
  const progressBar     = document.getElementById('avatar-progress');
  const statusEl        = document.getElementById('avatar-status');

  avatarInput.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;

    statusEl.textContent = '';
    progressTrack.hidden = false;
    progressBar.style.width = '0%';

    try {
      const url = await uploadImage(file, (pct) => {
        progressBar.style.width = pct + '%';
      });

      // Guardar en Supabase
      const { error } = await sb
        .from('profiles')
        .update({ avatar_url: url })
        .eq('id', user.id);

      if (error) throw new Error(error.message);

      profile = { ...profile, avatar_url: url };
      renderProfile(profile);
      renderHeaderChip(chipSlot, profile, () => window.location.replace('./login.html'));
      statusEl.textContent = '✓ Photo updated';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      progressTrack.hidden = true;
      progressBar.style.width = '0%';
      avatarInput.value = '';
    }
  });

  // ── Sign out ─────────────────────────────────────────────
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await signOut();
    window.location.replace('./login.html');
  });
</script>

</body>
</html>
