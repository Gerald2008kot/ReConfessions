<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Re-Confessions</title>
  <meta name="description" content="Tu espacio seguro y anónimo." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/patch.css" />
  <link rel="stylesheet" href="css/patch2.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- Único contenedor raíz. Las vistas se inyectan y montan dinámicamente. -->
<div id="app-root"></div>

<!-- ── Scripts ─────────────────────────────────────────────────-->
<script type="module">
  import { getCurrentUser, getProfile,
           renderHeaderChip, onAuthStateChange,
           signOut }                        from './js/auth.js';
  import { getInitials }                    from './js/utils.js';
  import { routerPush, routerBack }         from './js/router.js';

  // ── Tema ──────────────────────────────────────────────────────
  const savedTheme = localStorage.getItem('rc_theme') || 'dark';
  applyTheme(savedTheme);
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('rc_theme', theme);
    const darkIcon  = document.getElementById('theme-icon-dark');
    const lightIcon = document.getElementById('theme-icon-light');
    if (darkIcon)  darkIcon.hidden  = theme === 'light';
    if (lightIcon) lightIcon.hidden = theme === 'dark';
  }

  // ── Profile sheet helpers ─────────────────────────────────────
  function openProfileSheet() {
    document.getElementById('profile-sheet')?.classList.add('open');
    document.getElementById('profile-overlay')?.classList.add('open');
    routerPush('sheet', closeProfileSheet);
  }
  function closeProfileSheet() {
    document.getElementById('profile-sheet')?.classList.remove('open');
    document.getElementById('profile-overlay')?.classList.remove('open');
  }
  window.__openProfileSheet  = openProfileSheet;
  window.__closeProfileSheet = closeProfileSheet;

  function closeSheetThen(fn) {
    closeProfileSheet();
    setTimeout(fn, 180);
  }

  // ── Login SPA ─────────────────────────────────────────────────
  async function showLogin() {
    const root = document.getElementById('app-root');
    if (root) root.innerHTML = '';
    // Limpiar overlays
    document.getElementById('profile-sheet')?.remove();
    document.getElementById('profile-overlay')?.remove();
    await import('./js/login.js').catch(() => {});
  }
  window.__showLogin = showLogin;

  const isGuest = sessionStorage.getItem('rc_guest') === '1';

  onAuthStateChange(event => {
    if (event === 'SIGNED_OUT' && !isGuest) showLogin();
  });

  const urlParams = new URLSearchParams(location.search);
  if (urlParams.get('open') === 'hilos') {
    window.__pendingOpen = 'hilos';
    history.replaceState(null, '', location.pathname);
  }

  // ── Boot ──────────────────────────────────────────────────────
  async function boot() {
    const user = await getCurrentUser();
    if (!user && !isGuest) { showLogin(); return; }

    // Montar el feed (genera su propio HTML en #app-root)
    const { initFeed, mountFeedHTML } = await import('./js/feed.js');
    mountFeedHTML(document.getElementById('app-root'));

    const chipSlot = document.getElementById('header-chip');
    const profile  = user ? await getProfile(user.id) : null;

    // ── Tema (botón ya está en el DOM tras mountFeedHTML) ────────
    document.getElementById('theme-btn')?.addEventListener('click', () => {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    applyTheme(savedTheme); // re-apply para íconos recién montados

    renderHeaderChip(chipSlot, profile, openProfileSheet);

    // ── Profile sheet ────────────────────────────────────────────
    // El sheet se inyecta en el DOM cuando se necesita por primera vez
    async function ensureProfileSheet() {
      if (document.getElementById('profile-sheet')) return;
      const { mountProfileSheet } = await import('./js/feed.js');
      mountProfileSheet(document.body);
    }

    // Clic en el chip del header abre el sheet
    chipSlot?.addEventListener('click', async () => {
      await ensureProfileSheet();
      openProfileSheet();
    });

    if (user && profile) {
      await ensureProfileSheet();
      document.getElementById('sheet-name').textContent  = profile.full_name;
      document.getElementById('sheet-email').textContent = user.email;
      const sheetAv = document.getElementById('sheet-avatar');
      if (sheetAv) {
        if (profile.avatar_url) {
          const img = document.createElement('img');
          img.src = profile.avatar_url; img.alt = 'Avatar';
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
          sheetAv.appendChild(img);
        } else {
          sheetAv.textContent = getInitials(profile.full_name);
        }
      }
    }

    document.getElementById('profile-sheet-handle')?.addEventListener('click', routerBack);
    document.getElementById('profile-overlay')?.addEventListener('click', routerBack);

    function backToFeed() {
      document.getElementById('view-feed')?.classList.add('active');
    }

    // openChat desde vistas externas
    async function openChatFromConfession(confession) {
      const { switchView } = await import('./js/feed.js');
      switchView('chat');
      const { openChat } = await import('./js/chat.js');
      await openChat(confession);
    }

    // ── Perfil ───────────────────────────────────────────────────
    document.getElementById('sheet-perfil')?.addEventListener('click', async () => {
      closeSheetThen(async () => {
        const { initPerfil, openPerfil } = await import('./js/perfil.js');
        await initPerfil(user, profile, chipSlot, backToFeed);
        openPerfil();
      });
    });

    // ── Admin ────────────────────────────────────────────────────
    if (profile?.is_admin) {
      const sheetAdmin = document.getElementById('sheet-admin');
      if (sheetAdmin) sheetAdmin.hidden = false;
      sheetAdmin?.addEventListener('click', async () => {
        closeSheetThen(async () => {
          const { initAdmin, openAdmin } = await import('./js/admin.js');
          initAdmin(backToFeed);
          openAdmin();
        });
      });
    }

    // ── Hilos ─────────────────────────────────────────────────────
    if (user) {
      const hilosBtn = document.getElementById('hilos-btn');
      if (hilosBtn) hilosBtn.hidden = false;

      let hilosMod = null;
      async function openHilosView() {
        if (!hilosMod) {
          hilosMod = await import('./js/hilos.js');
          await hilosMod.initHilos(user, backToFeed, openChatFromConfession);
        }
        hilosMod.openHilos();
      }
      hilosBtn?.addEventListener('click', openHilosView);
      document.getElementById('sheet-notif')?.addEventListener('click', () => {
        closeSheetThen(openHilosView);
      });

      hilosMod = await import('./js/hilos.js');
      await hilosMod.initHilos(user, backToFeed, openChatFromConfession);
      hilosMod.updateHilosCount?.();

      if (window.__pendingOpen === 'hilos') {
        window.__pendingOpen = null;
        setTimeout(openHilosView, 500);
      }
    }

    // ── Sign out ──────────────────────────────────────────────────
    document.getElementById('sheet-signout')?.addEventListener('click', async () => {
      sessionStorage.removeItem('rc_guest');
      await signOut();
      showLogin();
    });

    // ── Buscar — lazy ─────────────────────────────────────────────
    let buscarMod = null;
    async function openBuscarView() {
      if (!buscarMod) {
        buscarMod = await import('./js/buscar.js');
        buscarMod.initBuscar(backToFeed, openChatFromConfession);
      }
      buscarMod.openBuscar();
    }
    document.getElementById('sheet-buscar')?.addEventListener('click', () => {
      closeSheetThen(openBuscarView);
    });

    // ── Explorar — lazy ───────────────────────────────────────────
    let explorarMod = null;
    async function openExplorarView() {
      if (!explorarMod) {
        explorarMod = await import('./js/explorar.js');
        explorarMod.initExplorar(backToFeed, openChatFromConfession);
      }
      explorarMod.openExplorar();
    }
    document.getElementById('sheet-explorar')?.addEventListener('click', () => {
      closeSheetThen(openExplorarView);
    });

    // ── Notificaciones — solo logged-in ───────────────────────────
    if (user) {
      const notifBtn = document.getElementById('notif-btn');
      if (notifBtn) notifBtn.hidden = false;
      const sheetNotifBtn = document.getElementById('sheet-notif');
      if (sheetNotifBtn) sheetNotifBtn.hidden = false;

      // Carga notifications.js (badge) de forma lazy pero rápida
      import('./js/notifications.js').then(nc => {
        nc.initNotifications(document.getElementById('notif-badge'), null);
      }).catch(() => {});

      let notifMod = null;
      async function openNotifView() {
        if (!notifMod) {
          notifMod = await import('./js/notificaciones.js');
          notifMod.initNotificaciones(backToFeed);
        }
        notifMod.openNotificaciones();
      }
      notifBtn?.addEventListener('click', openNotifView);
      document.getElementById('sheet-notif')?.addEventListener('click', () => {
        closeSheetThen(openNotifView);
      });
    }

    // ── Logo reload ───────────────────────────────────────────────
    document.getElementById('logo-btn')?.addEventListener('click', () => window.location.reload());

    // ── Feed principal ────────────────────────────────────────────
    await initFeed();
  }

  boot();
</script>

</body>
</html>
